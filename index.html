<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<meta name="theme-color" content="#07110d" />
<title>HS Invest｜ETF 週KD加碼雷達</title>
<style>
:root{--bg:#07110d;--panel:#0d1b15;--panel2:#12241b;--line:#234231;--text:#f4fff8;--muted:#9eb6a8;--green:#52e38c;--red:#ff5e6c;--yellow:#ffd84d;--orange:#ff9d42;--purple:#b86cff}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at top,#163323 0,#07110d 42%);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}main{max-width:1100px;margin:auto;padding:24px 16px 60px}header{display:flex;justify-content:space-between;gap:20px;align-items:flex-start;margin-bottom:18px}.eyebrow{margin:0 0 6px;color:var(--green);font-weight:800;letter-spacing:.16em;font-size:12px}h1,h2{margin:0}h1{font-size:clamp(28px,6vw,46px)}.subtitle{color:var(--muted);margin:8px 0 0;line-height:1.5}button{border:1px solid #2d5a40;background:#173b28;color:#eafff1;border-radius:14px;padding:12px 16px;font-weight:800;white-space:nowrap}.legend,.checks{display:flex;gap:8px;flex-wrap:wrap;margin:16px 0}.legend span,.checks label,.pill{border-radius:999px;padding:7px 11px;font-size:12px;font-weight:800;border:1px solid transparent}.neutralTag{background:#26322c}.yellowTag{background:#443c12;color:#ffe46f}.orangeTag{background:#4a2912;color:#ffb46f}.redTag{background:#481a21;color:#ff9ba4}.purpleTag{background:#351c4d;color:#d8aaff}.toolbar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:18px}.token{flex:1;min-width:220px;background:#0b1711;border:1px solid var(--line);color:white;border-radius:12px;padding:12px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:14px}.card{background:linear-gradient(160deg,#14271d,#0b1711);border:1px solid var(--line);border-radius:22px;padding:18px;box-shadow:0 14px 30px #0005}.card.yellow{border-color:#947b18}.card.orange{border-color:#b95f1e}.card.red{border-color:#b72f3e}.card.purple{border-color:#8f47d1;box-shadow:0 0 25px #8738c944}.cardTop,.priceRow,.meta,.sectionHead{display:flex;justify-content:space-between;gap:10px;align-items:center}.ticker{font-size:25px;font-weight:900}.name,.meta,small{color:var(--muted)}.rank{font-size:12px;background:#1b3527;padding:6px 9px;border-radius:999px}.priceRow{margin:18px 0 12px}.priceRow strong{font-size:28px}.up{color:#ff6e76}.down{color:#67e59b}.signal{font-weight:900;margin-bottom:14px}.dot{display:inline-block;width:9px;height:9px;border-radius:50%;background:currentColor;margin-right:7px}.kdj{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.kdj div{background:#07110d;border-radius:12px;padding:10px}.kdj span{display:block;color:var(--muted);font-size:12px}.kdj b{font-size:20px}.jbox{outline:1px solid #3e684e}.meta{font-size:12px;margin-top:14px}.compare{margin-top:28px;background:#0b1711;border:1px solid var(--line);border-radius:24px;padding:18px}.sectionHead{align-items:flex-end}.checks label{background:#13261b;border-color:#294a36}.checks input{margin-right:6px}.tableWrap{overflow:auto;border-radius:14px;border:1px solid var(--line)}table{width:100%;border-collapse:collapse;min-width:760px}th,td{padding:13px;border-bottom:1px solid #1f392a;text-align:center}th:first-child,td:first-child{text-align:left;position:sticky;left:0;background:#0d1b15}.warning,.error,.info{padding:13px;border-radius:12px;line-height:1.55}.warning{background:#3b2a0d;color:#ffe3a1}.error{background:#431a20;color:#ffafb6}.info{background:#10271a;color:#bcebcf}.skeleton{padding:40px;text-align:center;color:var(--muted)}footer{text-align:center;color:var(--muted);padding:30px}.hidden{display:none}@media(max-width:620px){header{display:block}header button{margin-top:14px;width:100%}.sectionHead{display:block}.sectionHead small{display:block;margin-top:8px}}
</style>
</head>
<body><main>
<header><div><p class="eyebrow">HS INVEST</p><h1>ETF 週KD加碼雷達</h1><p class="subtitle">J值越低，買點顏色越強烈。開啟網站即可更新最新收盤資料。</p></div><button id="reload">立即更新</button></header>
<div class="toolbar"><input id="token" class="token" placeholder="FinMind Token（可留空；額度不足時再填）"><button id="saveToken">儲存 Token</button></div>
<div id="message" class="info">正在取得 00830、00662、009815、0050、00631L 最新資料…</div>
<section class="legend"><span class="neutralTag">20以上 等待</span><span class="yellowTag">10–20 加碼</span><span class="orangeTag">0–10 更棒</span><span class="redTag">-10–0 強力</span><span class="purpleTag">-10以下 極度超賣</span></section>
<section id="cards" class="grid"><div class="skeleton">資料載入中…</div></section>
<section class="compare"><div class="sectionHead"><div><p class="eyebrow">ETF COMPARATOR</p><h2>ETF 比較器</h2></div><small id="updated">最後更新：—</small></div><div id="checks" class="checks"></div><div class="tableWrap"><table><thead id="thead"></thead><tbody id="tbody"></tbody></table></div><p class="warning">00631L 為正向2倍槓桿ETF，具有每日重設與波動耗損風險，不應只依J值決定投入比例。</p></section>
<footer>Version 1.0 · Developed by 弘昇</footer>
</main>
<script>
const META={"00830":{name:"國泰費城半導體",type:"海外股票",risk:"高"},"00662":{name:"富邦NASDAQ",type:"海外股票",risk:"高"},"009815":{name:"大華美國科技50",type:"海外股票",risk:"高"},"0050":{name:"元大台灣50",type:"台灣股票",risk:"中高"},"00631L":{name:"元大台灣50正2",type:"槓桿ETF",risk:"極高"}};
const ids=Object.keys(META), selected=new Set(ids);let all=[];
const fmt=n=>Number.isFinite(+n)?new Intl.NumberFormat('zh-TW',{maximumFractionDigits:2}).format(+n):'—';
function startDate(){const d=new Date();d.setDate(d.getDate()-560);return d.toISOString().slice(0,10)}
function weekly(rows){const m=new Map();for(const r of rows){const d=new Date(r.date+'T00:00:00+08:00'),day=d.getDay()||7,mon=new Date(d);mon.setDate(d.getDate()-day+1);const key=mon.toISOString().slice(0,10),p=+r.close,h=+(r.max??r.close),l=+(r.min??r.close);if(!m.has(key))m.set(key,{date:r.date,close:p,high:h,low:l});const w=m.get(key);w.date=r.date;w.close=p;w.high=Math.max(w.high,h);w.low=Math.min(w.low,l)}return [...m.values()].sort((a,b)=>a.date.localeCompare(b.date))}
function kdj(ws){let k=50,d=50,previousJ=50,latest;ws.forEach((w,i)=>{const s=ws.slice(Math.max(0,i-8),i+1),hi=Math.max(...s.map(x=>x.high)),lo=Math.min(...s.map(x=>x.low)),rsv=hi===lo?50:(w.close-lo)/(hi-lo)*100;k=2/3*k+1/3*rsv;d=2/3*d+1/3*k;const j=3*k-2*d;latest={k,d,j,previousJ,date:w.date};previousJ=j});return latest}
function sig(j){if(j<-10)return{label:'極度超賣',className:'purple'};if(j<0)return{label:'強力加碼點',className:'red'};if(j<10)return{label:'更棒買點',className:'orange'};if(j<20)return{label:'加碼點',className:'yellow'};return{label:'等待',className:'neutral'}}
async function one(id){const q=new URLSearchParams({dataset:'TaiwanStockPrice',data_id:id,start_date:startDate()});const t=localStorage.getItem('finmind_token');if(t)q.set('token',t);const res=await fetch('https://api.finmindtrade.com/api/v4/data?'+q);if(!res.ok)throw new Error(id+' 資料讀取失敗');const j=await res.json();if(!j.data?.length)throw new Error(id+' 沒有價格資料');const rows=j.data.sort((a,b)=>a.date.localeCompare(b.date)),latest=rows.at(-1),price=+latest.close,first=rows.find(r=>r.date>=new Date().getFullYear()+'-01-01')||rows[0],last=rows.slice(-252),high52=Math.max(...last.map(r=>+(r.max??r.close))),low52=Math.min(...last.map(r=>+(r.min??r.close))),x=kdj(weekly(rows));return{id,...META[id],price,date:latest.date,changePct:rows.length>1?(price/+rows.at(-2).close-1)*100:0,ytd:(price/+first.close-1)*100,high52,low52,fromHigh:(price/high52-1)*100,k:x.k,d:x.d,j:x.j,previousJ:x.previousJ,direction:x.j>x.previousJ?'回升':'下探',signal:sig(x.j)}}
function render(){all.sort((a,b)=>a.j-b.j);document.querySelector('#cards').innerHTML=all.map((x,i)=>`<article class="card ${x.signal.className}"><div class="cardTop"><div><div class="ticker">${x.id}</div><div class="name">${x.name}</div></div><span class="rank">買點 #${i+1}</span></div><div class="priceRow"><strong>$${fmt(x.price)}</strong><span class="${x.changePct>=0?'up':'down'}">${x.changePct>=0?'+':''}${fmt(x.changePct)}%</span></div><div class="signal"><span class="dot"></span>${x.signal.label}</div><div class="kdj"><div><span>K</span><b>${fmt(x.k)}</b></div><div><span>D</span><b>${fmt(x.d)}</b></div><div class="jbox"><span>J</span><b>${fmt(x.j)}</b></div></div><div class="meta"><span>週J ${x.direction}</span><span>距高點 ${fmt(x.fromHigh)}%</span></div></article>`).join('');document.querySelector('#checks').innerHTML=all.map(x=>`<label><input type="checkbox" data-id="${x.id}" checked>${x.id}</label>`).join('');document.querySelectorAll('#checks input').forEach(el=>el.onchange=()=>{el.checked?selected.add(el.dataset.id):selected.delete(el.dataset.id);renderTable()});renderTable()}
function renderTable(){const c=all.filter(x=>selected.has(x.id));document.querySelector('#thead').innerHTML='<tr><th>項目</th>'+c.map(x=>`<th>${x.id}</th>`).join('')+'</tr>';const row=(n,f)=>`<tr><td>${n}</td>${c.map(f).join('')}</tr>`;document.querySelector('#tbody').innerHTML=row('名稱',x=>`<td>${x.name}</td>`)+row('最新價',x=>`<td>$${fmt(x.price)}</td>`)+row('今年報酬',x=>`<td class="${x.ytd>=0?'up':'down'}">${fmt(x.ytd)}%</td>`)+row('距52週高點',x=>`<td>${fmt(x.fromHigh)}%</td>`)+row('週K / D / J',x=>`<td>${fmt(x.k)} / ${fmt(x.d)} / <b>${fmt(x.j)}</b></td>`)+row('訊號',x=>`<td><span class="pill ${x.signal.className}">${x.signal.label}</span></td>`)+row('類型',x=>`<td>${x.type}</td>`)+row('風險',x=>`<td>${x.risk}</td>`)}
async function load(){const m=document.querySelector('#message'),b=document.querySelector('#reload');m.className='info';m.textContent='正在更新最新資料…';b.disabled=true;b.textContent='更新中…';try{all=await Promise.all(ids.map(one));render();m.textContent='資料更新成功。技術指標由每日價格換算為週線後計算。';document.querySelector('#updated').textContent='最後更新：'+new Date().toLocaleString('zh-TW')}catch(e){m.className='error';m.innerHTML='更新失敗：'+e.message+'<br>若瀏覽器阻擋跨網域或API額度不足，請填入 FinMind Token 後再更新。'}finally{b.disabled=false;b.textContent='立即更新'}}
document.querySelector('#token').value=localStorage.getItem('finmind_token')||'';document.querySelector('#saveToken').onclick=()=>{localStorage.setItem('finmind_token',document.querySelector('#token').value.trim());load()};document.querySelector('#reload').onclick=load;load();
</script></body></html>
